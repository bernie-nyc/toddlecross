version: '3.8'

services:
  web:
    build: .
    container_name: toddlecross_web
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: toddlecross_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=toddlecross
      - POSTGRES_USER=toddlecross
      - POSTGRES_PASSWORD=toddlecross_secure_pwd
    ports:
      - "5432:5432"

volumes:
  postgres_data:
