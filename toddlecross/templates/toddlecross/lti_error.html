{% extends 'toddlecross/base.html' %}

{% block title %}Authentication Error - Toddlecross{% endblock %}

{% block extra_css %}
<style>
    .error-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
        width: 100%;
    }

    .error-card {
        padding: 3rem 2.5rem;
        width: 100%;
        max-width: 500px;
        text-align: center;
        border-radius: 20px;
        border-color: rgba(239, 68, 68, 0.2);
    }

    .error-icon-container {
        margin: 0 auto 1.5rem auto;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background-color: rgba(239, 68, 68, 0.1);
        color: #ef4444;
    }

    .error-title {
        font-size: 2rem;
        margin-bottom: 0.75rem;
        background: linear-gradient(135deg, #ffffff 0%, #fecaca 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.5px;
    }

    .error-message {
        color: var(--text-muted);
        font-size: 1rem;
        margin-bottom: 2.5rem;
        line-height: 1.6;
    }

    .error-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--primary);
        color: white;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        padding: 0.85rem;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        font-size: 1.05rem;
    }

    .error-btn:hover {
        background-color: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4);
    }

    .bg-glow-orb {
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(239, 68, 68, 0.08) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: -1;
        pointer-events: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="error-container">
    <div class="bg-glow-orb"></div>
    <div class="glass-card error-card">
        <div class="error-icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        </div>
        <h2 class="error-title">Access Denied</h2>
        <p class="error-message">
            {{ error_message|default:"You are not authorized to access this resource." }}
        </p>

        <a href="/" class="error-btn">Return to Home</a>
    </div>
</div>
{% endblock %}
