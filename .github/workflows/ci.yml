name: Django CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Create Mock LTI Keys for Testing
        run: |
          mkdir -p config/lti_keys
          openssl genrsa -out config/lti_keys/private.key 2048
          openssl rsa -in config/lti_keys/private.key -pubout -out config/lti_keys/public.key

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Migrations
        env:
          SECRET_KEY: 'django-insecure-test-key-for-ci'
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Run Database Migrations
        env:
          SECRET_KEY: 'django-insecure-test-key-for-ci'
        run: |
          python manage.py migrate --noinput

      - name: Run Django Tests with Coverage
        env:
          SECRET_KEY: 'django-insecure-test-key-for-ci'
        run: |
          coverage run manage.py test

      - name: Run Coverage Report
        run: |
          coverage report

      - name: Run Collectstatic Verification
        env:
          SECRET_KEY: 'django-insecure-test-key-for-ci'
        run: |
          python manage.py collectstatic --noinput
